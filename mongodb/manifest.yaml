apiVersion: apps/v1
kind: Deployment

metadata:
   name: mongodb
   namespace: threetierapp
   # these labels used for replicaset
   labels:
     project: threetierapp
     component: mongodb
     tier: db

spec:
   replicas: 1
   selector:
     # these leables are used to select pos
     matchLabels:
           project: threetierapp
           component: mongodb
           tier: db

template:
 metadata:
   labels:
     project: threetierapp
     component: mongodb
     tier: db

 spec:
   containers:
      - name: mongodb
        image: vikasae/mongodb:v1
        readinessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 5
          periodSeconds: 5 

---

apiVersion: v1 
kind: Service

metadata:
  name: mongodb

spec:
  selector:
     project: threetierapp
     component: mongodb
     tier: db
  ports:
    - protocol: TCP
      port: 27017 # service port
      targetPort: 27017 # container port
  
    