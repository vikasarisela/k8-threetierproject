apiVersion: v1/app
kind: Depoloyment

metadata:
   name: mongodb
   namespace: threetierapp
   labels:
     project: threetierapp
     componnent: mongodb
     tier: db

spec:
   replicaSet: 1
   selector:
     matchlabels:
           project: threetierapp
           componnent: mongodb
           tier: db

---
template:
metadata:
   labels:
     project: threetierapp
     componnent: mongodb
     tier: db

spec:
   containers:
      - name: mongodb
        image: vikasarisela/mongodb
        readinessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 5
          periodSeconds: 5 

---

apiVersion: v1 
kind: Service

metadata:
  name: mongodb

spec:
  selector:
     project: threetierapp
     componnent: mongodb
     tier: db
  ports:
    - protocol: TCP
      port: 27017 # service port
      targetPort: 27017 # container port
  
    