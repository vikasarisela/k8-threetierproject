apiVersion: apps/v1
kind: Deployment

metadata:
  name: rabbitmq
  namespace: threetierapp
  labels:
    project: threetierapp
    component: rabbitmq
    tier: db

spec:
  replicas: 1

  selector:
    matchLabels:
      project: threetierapp
      component: rabbitmq
      tier: db

  template:
    metadata:
      labels:
        project: threetierapp
        component: rabbitmq
        tier: db

    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3
        readinessProbe:
          tcpSocket:
            port: 5672
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 5672
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service

metadata:
  name: rabbitmq

spec:
  selector:
    project: threetierapp
    component: rabbitmq
    tier: db
  ports:
  - protocol: TCP
    port: 5672
    targetPort: 5672